services:
  db:
    image: postgres:16
    container_name: zapateria_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zapateria_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: shoe_store_api
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/zapateria_db?schema=public
      NODE_ENV: development
    depends_on:
      - db

volumes:
  postgres_data:
